<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00ffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7a7aff" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- base mist -->
  <rect width="1600" height="900" fill="#06111f"/>
  <rect width="1600" height="900" fill="url(#glow)" opacity="0.9"/>

  <!-- circuit lines -->
