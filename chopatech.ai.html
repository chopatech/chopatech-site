<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChopaTech AI Assistant</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background: linear-gradient(to bottom right,#06111f,#0b1729);
    }

    ::-webkit-scrollbar{
      width:6px;
    }

    ::-webkit-scrollbar-thumb{
      background:#10b981;
      border-radius:10px;
    }

  </style>

</head>

<body class="text-white overflow-hidden">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-72 bg-black/30 border-r border-white/10 p-6 backdrop-blur-xl flex flex-col">

    <h1 class="text-3xl font-black mb-10">
      🤖 <span class="text-emerald-400">ChopaTech</span> AI
    </h1>

    <nav class="space-y-4 text-sm">

      <button onclick="newChat()"
        class="w-full text-left p-4 rounded-2xl bg-white/10 hover:bg-white/20 transition">
        💬 New Chat
      </button>

      <label
        class="w-full block text-left p-4 rounded-2xl hover:bg-white/10 transition cursor-pointer">

        📎 Upload File

        <input
          type="file"
          hidden
          onchange="uploadFile(event)">
      </label>

      <button onclick="startVoice()"
        class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        🎤 Voice Talk
      </button>

      <button
        class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        ⚙ Settings
      </button>

    </nav>

    <div
      class="mt-auto bg-white/5 border border-white/10 rounded-3xl p-5">

      <p class="text-gray-400 text-xs">
        Workers AI Status
      </p>

      <h2 class="text-2xl font-bold text-emerald-400 mt-2">
        Online
      </h2>

    </div>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col">

    <!-- TOP BAR -->
    <header
      class="border-b border-white/10 p-5 bg-black/20 backdrop-blur-xl flex justify-between items-center">

      <div>

        <h2 class="text-2xl font-bold">
          ChopaTech AI Assistant
        </h2>

        <p class="text-gray-400 text-sm mt-1">
          AI powered by Cloudflare Workers AI
        </p>

      </div>

      <button onclick="startVoice()"
        class="bg-emerald-500 hover:bg-emerald-400 px-5 py-3 rounded-2xl font-bold transition">

        🎙 Talk

      </button>

    </header>

    <!-- CHAT -->
    <div id="chatBox"
      class="flex-1 overflow-y-auto p-8 space-y-6">

      <!-- AI MESSAGE -->
      <div class="flex">

        <div
          class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">

          👋 Welcome to ChopaTech AI.<br><br>

          You can:
          <br>
          • Ask questions
          <br>
          • Upload files
          <br>
          • Talk with voice

        </div>

      </div>

    </div>

    <!-- UPLOAD PREVIEW -->
    <div id="uploadPreview"
      class="px-8 py-2 hidden">

      <div
        class="bg-white/10 border border-white/10 rounded-2xl p-4 flex justify-between items-center">

        <span id="fileName">
          file.pdf
        </span>

        <button onclick="removeUpload()"
          class="text-red-400 text-xl">
          ✖
        </button>

      </div>

    </div>

    <!-- INPUT -->
    <div
      class="border-t border-white/10 p-5 bg-black/20 backdrop-blur-xl">

      <div class="flex gap-4 items-center">

        
<!-- ===================================== -->
<!-- MODEL + LANGUAGE SELECTORS -->
<!-- WEKA JUU YA MESSAGE INPUT -->
<!-- ===================================== -->

<div class="grid grid-cols-2 gap-4 mb-4">

  <!-- MODEL SELECT -->
  <select
    id="modelSelect"
    class="w-full p-4 rounded-2xl bg-[#111827] border border-white/10 text-white outline-none">

    <option value="@cf/meta/llama-3.1-8b-instruct">
      Llama 3.1
    </option>

    <option value="@cf/meta/llama-3-8b-instruct">
      Llama 3 8B
    </option>

    <option value="@cf/mistralai/mistral-7b-instruct-v0.1">
      Mistral 7B
    </option>

    <option value="@cf/qwen/qwen1.5-14b-chat-awq">
      Qwen 14B
    </option>

    <option value="@cf/google/gemma-7b-it">
      Gemma 7B
    </option>

    <option value="gpt-style">
      GPT Style Assistant
    </option>

  </select>



  <!-- LANGUAGE SELECT -->
  <select
    id="languageSelect"
    class="w-full p-4 rounded-2xl bg-[#111827] border border-white/10 text-white outline-none">

    <option value="auto">
      Auto Detect
    </option>

    <option value="english">
      English Only
    </option>

    <option value="swahili">
      Kiswahili Only
    </option>

  </select>

</div>

        <textarea
          id="messageInput"
          rows="1"
          placeholder="Message ChopaTech AI..."
          class="flex-1 p-4 rounded-2xl bg-white/10 border border-white/10 outline-none resize-none"></textarea>

        <button onclick="startVoice()"
          class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl transition text-2xl">

          🎤

        </button>

        <button onclick="sendMessage()"
          class="bg-emerald-500 hover:bg-emerald-400 px-8 py-4 rounded-2xl font-bold transition">

          Send

        </button>

      </div>

    </div>

  </main>

</div>

<script>

// ======================================
// CHOPATECH AI FRONTEND JAVASCRIPT
// ======================================


// NEW CHAT
function newChat(){

  document.getElementById(
    'chatBox'
  ).innerHTML = `

    <div class="flex">

      <div
        class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">

        👋 Karibu ChopaTech AI

        <br><br>

        Ninaweza:
        <br>
        • Kujibu Kiswahili
        <br>
        • Kujibu English
        <br>
        • Kupokea voice
        <br>
        • Kusaidia coding
        <br>
        • Kutoa maelezo mazuri

      </div>

    </div>

  `;

}



// SEND MESSAGE
async function sendMessage(){

  const input =
    document.getElementById(
      'messageInput'
    );

  const text =
    input.value.trim();

  if(!text) return;



  const chatBox =
    document.getElementById(
      'chatBox'
    );



  // USER MESSAGE
  const user =
    document.createElement('div');

  user.className =
    'flex justify-end';

  user.innerHTML = `

    <div
      class="bg-emerald-500 text-black rounded-3xl p-5 max-w-[70%]">

      ${text}

    </div>

  `;

  chatBox.appendChild(user);
  

  input.value = '';

  // ======================================
// IMAGE REFERENCES
// ======================================

const imageKeywords = [

  "image",
  "picture",
  "photo",
  "design",
  "logo",
  "website",
  "ui",
  "car",
  "house",
  "fashion",
  "technology",
  "computer",
  "phone",
  "nature",
  "robot",
  "ai",
  "anime"

];



const matched = imageKeywords.find(
  keyword =>
    text.toLowerCase()
    .includes(keyword)
);



if(matched){

  const image =
    document.createElement('img');

  image.src =
    `https://source.unsplash.com/900x500/?${matched}`;

  image.className =
    "rounded-3xl mt-4 border border-white/10";

  ai.appendChild(image);

}


  // LOADING
  const loading =
    document.createElement('div');

  loading.className =
    'flex';

  loading.innerHTML = `

    <div
      class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%] animate-pulse">

      🤖 ChopaTech AI inaandika...

    </div>

  `;

  chatBox.appendChild(loading);

  chatBox.scrollTop =
    chatBox.scrollHeight;



  try{

// =====================================
// FETCH UPDATE
// WEKA NDANI YA sendMessage()
// =====================================

const response =
  await fetch(

    "https://chopatech-ai.chopatechtz.workers.dev/",

    {

      method: "POST",

      headers: {

        "Content-Type":
          "application/json"

      },

      body: JSON.stringify({

        message: text,

        model:
          document.getElementById(
            'modelSelect'
          ).value,

        language:
          document.getElementById(
            'languageSelect'
          ).value

      })

    }

);



    // CHECK RESPONSE
    if(!response.ok){

      throw new Error(
        "Server Error"
      );

    }



    const data =
      await response.json();



    loading.remove();



    // AI RESPONSE
    const aiResponse =

      data.response ||

      data.result?.response ||

      "Samahani hakuna majibu.";





    // AI BOX
    const ai =
      document.createElement('div');

    ai.className =
      'flex';



    ai.innerHTML = `

      <div
        class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">

        <div id="typing"></div>

      </div>

    `;

    chatBox.appendChild(ai);



    // TYPE EFFECT
    typeWriterEffect(

      ai.querySelector('#typing'),

      aiResponse

    );



    chatBox.scrollTop =
      chatBox.scrollHeight;



  }

  catch(error){

    loading.remove();



    const err =
      document.createElement('div');

    err.className =
      'flex';



    err.innerHTML = `

      <div
        class="bg-red-500/20 border border-red-500 rounded-3xl p-5 max-w-[70%]">

        ❌ AI haijaunganishwa vizuri.

      </div>

    `;

    chatBox.appendChild(err);

    console.error(error);

  }

}



// GPT TYPING EFFECT
function typeWriterEffect(
  element,
  text
){

  let i = 0;

  const speed = 15;

  function typing(){

    if(i < text.length){

      element.innerHTML +=
        text.charAt(i);

      i++;

      setTimeout(
        typing,
        speed
      );

    }

  }

  typing();

}



// VOICE INPUT
function startVoice(){

  if(
    !(
      'webkitSpeechRecognition'
      in window
    )
  ){

    alert(
      "Browser yako haisupport voice."
    );

    return;

  }



  const recognition =
    new webkitSpeechRecognition();



  recognition.lang =
    'en-US';

  recognition.continuous =
    false;

  recognition.interimResults =
    false;



  recognition.start();




  recognition.onresult =
    function(event){

      const transcript =

        event.results[0][0]
        .transcript;



      document.getElementById(
        'messageInput'
      ).value = transcript;



      sendMessage();

    };



  recognition.onerror =
    function(){

      alert(
        "Voice error."
      );

    };

}



// FILE UPLOAD
function uploadFile(event){

  const file =
    event.target.files[0];

  if(!file) return;



  document.getElementById(
    'uploadPreview'
  ).classList.remove('hidden');



  document.getElementById(
    'fileName'
  ).innerText =
    file.name;



  const chatBox =
    document.getElementById(
      'chatBox'
    );



  const upload =
    document.createElement('div');

  upload.className =
    'flex justify-end';



  upload.innerHTML = `

    <div
      class="bg-blue-500 rounded-3xl p-5 max-w-[70%]">

      📎 Uploaded:
      ${file.name}

    </div>

  `;

  chatBox.appendChild(upload);

  chatBox.scrollTop =
    chatBox.scrollHeight;

}



// REMOVE FILE
function removeUpload(){

  document.getElementById(
    'uploadPreview'
  ).classList.add('hidden');

}



// ENTER SEND
document
  .getElementById(
    'messageInput'
  )

  .addEventListener(

    'keydown',

    function(event){

      if(

        event.key === 'Enter'
        &&
        !event.shiftKey

      ){

        event.preventDefault();

        sendMessage();

      }

    }

);



// START
newChat();

</script>

</body>
</html>
