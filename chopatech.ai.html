<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChopaTech AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Favicon -->
<link rel="icon" type="image/png" href="/favicon.png">

<!-- Optional Apple devices -->
<link rel="apple-touch-icon" href="/favicon.png">

<link rel="icon" href="https://chopatech.com/favicon.png">
<meta property="og:image" content="https://chopatech.com/favicon.png"> 
</head>
<body class="bg-[#06111f] text-white h-screen flex flex-col">

<!-- Top Bar -->
<header class="p-4 border-b border-white/10 flex justify-between items-center">
  <h1 class="text-xl font-bold">
    <span class="text-emerald-400">ChopaTech</span> AI
  </h1>
  <a href="index.html" class="text-sm text-gray-300 hover:text-white">← Back</a>
</header>

<!-- Chat Container -->
<main class="flex-1 flex flex-col max-w-4xl mx-auto w-full p-4">

  <!-- Messages -->
  <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 p-4">
    <div class="bg-white/10 p-4 rounded-2xl w-fit max-w-[80%]">
      👋 Hello! I am ChopaTech AI. How can I help you today?
    </div>
  </div>

  <!-- Input -->
  <div class="p-4 border-t border-white/10 flex gap-3">
    <input id="userInput" type="text" placeholder="Type your message..."
      class="flex-1 p-3 rounded-xl bg-white/10 border border-white/10 outline-none" />

    <button onclick="sendMessage()"
      class="bg-emerald-500 hover:bg-emerald-400 px-6 py-3 rounded-xl font-semibold">
      Send
    </button>
  </div>

</main>

<script>
function addMessage(text, isUser=false){
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement('div');

  msg.className = isUser
    ? 'bg-emerald-500 text-black p-4 rounded-2xl ml-auto w-fit max-w-[80%]'
    : 'bg-white/10 p-4 rounded-2xl w-fit max-w-[80%]';

  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, true);
  input.value = '';

  // Fake AI response (replace with real API later)
  setTimeout(() => {
    addMessage("🤖 ChopaTech AI: I received your message - " + text);
  }, 800);
}
</script>

</body>
</html>
