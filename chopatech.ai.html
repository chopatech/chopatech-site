<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChopaTech AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#07111f] text-white overflow-hidden">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-72 bg-black/30 border-r border-white/10 p-6 backdrop-blur-xl flex flex-col">

    <h1 class="text-3xl font-black mb-10">
      🤖 <span class="text-emerald-400">ChopaTech</span> AI
    </h1>

    <nav class="space-y-4 text-sm">

      <button class="w-full text-left p-4 rounded-2xl bg-white/10 hover:bg-white/20 transition">
        💬 New Chat
      </button>

      <button class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        📁 Upload Files
      </button>

      <button class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        🎤 Voice Talk
      </button>

      <button class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        ⚙ Settings
      </button>

    </nav>

    <div class="mt-auto bg-white/5 border border-white/10 rounded-3xl p-5">
      <p class="text-gray-400 text-xs">AI Status</p>
      <h2 class="text-2xl font-bold text-emerald-400 mt-2">
        Online
      </h2>
    </div>

  </aside>

  <!-- Main Chat -->
  <main class="flex-1 flex flex-col">

    <!-- Top Bar -->
    <header class="border-b border-white/10 p-5 flex justify-between items-center bg-black/20 backdrop-blur-xl">

      <div>
        <h2 class="text-2xl font-bold">ChopaTech AI Assistant</h2>
        <p class="text-gray-400 text-sm mt-1">Modern AI assistant with upload + voice support</p>
      </div>

      <div class="flex gap-3">

        <button onclick="startVoice()"
          class="bg-emerald-500 hover:bg-emerald-400 px-5 py-3 rounded-2xl font-bold transition">
          🎤 Talk
        </button>

        <label class="bg-blue-500 hover:bg-blue-400 px-5 py-3 rounded-2xl font-bold transition cursor-pointer">
          📎 Upload
          <input type="file" hidden onchange="uploadFile(event)">
        </label>

      </div>

    </header>

    <!-- Chat Messages -->
    <div id="chatBox"
      class="flex-1 overflow-y-auto p-8 space-y-6 bg-gradient-to-b from-[#07111f] to-[#0c1829]">

      <div class="flex">
        <div class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">
          👋 Welcome to ChopaTech AI. You can type, upload files, or talk with voice.
        </div>
      </div>

    </div>

    <!-- Upload Preview -->
    <div id="uploadPreview" class="px-8 py-2 hidden">
      <div class="bg-white/10 border border-white/10 rounded-2xl p-4 flex justify-between items-center">
        <span id="fileName">file.pdf</span>
        <button onclick="removeUpload()" class="text-red-400">✖</button>
      </div>
    </div>

    <!-- Bottom Input -->
    <div class="border-t border-white/10 p-5 bg-black/20 backdrop-blur-xl">

      <div class="flex gap-4 items-center">

        <textarea id="messageInput"
          rows="1"
          placeholder="Message ChopaTech AI..."
          class="flex-1 p-4 rounded-2xl bg-white/10 border border-white/10 outline-none resize-none"></textarea>

        <button onclick="startVoice()"
          class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl transition text-2xl">
          🎙
        </button>

        <button onclick="sendMessage()"
          class="bg-emerald-500 hover:bg-emerald-400 px-8 py-4 rounded-2xl font-bold transition">
          Send
        </button>

      </div>

    </div>

  </main>

</div>

<script>

// SEND MESSAGE
async function sendMessage() {

  const input =
    document.getElementById('messageInput');

  const text =
    input.value.trim();

  if (!text) return;

  const chatBox =
    document.getElementById('chatBox');

  // USER MESSAGE
  const user =
    document.createElement('div');

  user.className =
    'flex justify-end';

  user.innerHTML = `
    <div class="bg-emerald-500 text-black rounded-3xl p-5 max-w-[70%]">
      ${text}
    </div>
  `;

  chatBox.appendChild(user);

  input.value = '';

  // AI LOADING
  const loading =
    document.createElement('div');

  loading.className = 'flex';

  loading.innerHTML = `
    <div class="bg-white/10 border border-white/10 rounded-3xl p-5">
      🤖 Thinking...
    </div>
  `;

  chatBox.appendChild(loading);

  chatBox.scrollTop =
    chatBox.scrollHeight;

  try {

    // CALL AI BACKEND
    const response = await fetch(
  "https://chopatech-ai.username.workers.dev",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          message: text
        })
      }
    );

    const data =
      await response.json();

    loading.remove();

    // AI RESPONSE
    const ai =
      document.createElement('div');

    ai.className = 'flex';

    ai.innerHTML = `
      <div class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">
        🤖 ${data.choices[0].message.content}
      </div>
    `;

    chatBox.appendChild(ai);

    chatBox.scrollTop =
      chatBox.scrollHeight;

  } catch(error) {

    loading.innerHTML = `
      <div class="bg-red-500/20 border border-red-500 rounded-3xl p-5">
        ❌ Error connecting to AI.
      </div>
    `;

    console.error(error);
  }
}

</script>

</body>
</html>
