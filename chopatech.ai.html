<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChopaTech AI Assistant</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background: linear-gradient(to bottom right,#06111f,#0b1729);
    }

    ::-webkit-scrollbar{
      width:6px;
    }

    ::-webkit-scrollbar-thumb{
      background:#10b981;
      border-radius:10px;
    }

  </style>

</head>

<body class="text-white overflow-hidden">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-72 bg-black/30 border-r border-white/10 p-6 backdrop-blur-xl flex flex-col">

    <h1 class="text-3xl font-black mb-10">
      🤖 <span class="text-emerald-400">ChopaTech</span> AI
    </h1>

    <nav class="space-y-4 text-sm">

      <button onclick="newChat()"
        class="w-full text-left p-4 rounded-2xl bg-white/10 hover:bg-white/20 transition">
        💬 New Chat
      </button>

      <label
        class="w-full block text-left p-4 rounded-2xl hover:bg-white/10 transition cursor-pointer">

        📎 Upload File

        <input
          type="file"
          hidden
          onchange="uploadFile(event)">
      </label>

      <button onclick="startVoice()"
        class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        🎤 Voice Talk
      </button>

      <button
        class="w-full text-left p-4 rounded-2xl hover:bg-white/10 transition">
        ⚙ Settings
      </button>

    </nav>

    <div
      class="mt-auto bg-white/5 border border-white/10 rounded-3xl p-5">

      <p class="text-gray-400 text-xs">
        Workers AI Status
      </p>

      <h2 class="text-2xl font-bold text-emerald-400 mt-2">
        Online
      </h2>

    </div>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col">

    <!-- TOP BAR -->
    <header
      class="border-b border-white/10 p-5 bg-black/20 backdrop-blur-xl flex justify-between items-center">

      <div>

        <h2 class="text-2xl font-bold">
          ChopaTech AI Assistant
        </h2>

        <p class="text-gray-400 text-sm mt-1">
          AI powered by Cloudflare Workers AI
        </p>

      </div>

      <button onclick="startVoice()"
        class="bg-emerald-500 hover:bg-emerald-400 px-5 py-3 rounded-2xl font-bold transition">

        🎙 Talk

      </button>

    </header>

    <!-- CHAT -->
    <div id="chatBox"
      class="flex-1 overflow-y-auto p-8 space-y-6">

      <!-- AI MESSAGE -->
      <div class="flex">

        <div
          class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">

          👋 Welcome to ChopaTech AI.<br><br>

          You can:
          <br>
          • Ask questions
          <br>
          • Upload files
          <br>
          • Talk with voice

        </div>

      </div>

    </div>

    <!-- UPLOAD PREVIEW -->
    <div id="uploadPreview"
      class="px-8 py-2 hidden">

      <div
        class="bg-white/10 border border-white/10 rounded-2xl p-4 flex justify-between items-center">

        <span id="fileName">
          file.pdf
        </span>

        <button onclick="removeUpload()"
          class="text-red-400 text-xl">
          ✖
        </button>

      </div>

    </div>

    <!-- INPUT -->
    <div
      class="border-t border-white/10 p-5 bg-black/20 backdrop-blur-xl">

      <div class="flex gap-4 items-center">

        <textarea
          id="messageInput"
          rows="1"
          placeholder="Message ChopaTech AI..."
          class="flex-1 p-4 rounded-2xl bg-white/10 border border-white/10 outline-none resize-none"></textarea>

        <button onclick="startVoice()"
          class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl transition text-2xl">

          🎤

        </button>

        <button onclick="sendMessage()"
          class="bg-emerald-500 hover:bg-emerald-400 px-8 py-4 rounded-2xl font-bold transition">

          Send

        </button>

      </div>

    </div>

  </main>

</div>

<script>

// ===============================
// CHOPATECH AI ULTIMATE SYSTEM
// Workers AI + Voice + Smart Language
// ===============================


// NEW CHAT
function newChat(){

  document.getElementById(
    'chatBox'
  ).innerHTML = `

    <div class="flex">

      <div
        class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%]">

        👋 Karibu ChopaTech AI

        <br><br>

        Ninaweza:
        <br>
        • Kuzungumza Kiswahili
        <br>
        • Kuzungumza English
        <br>
        • Kupokea voice
        <br>
        • Kujibu kwa sauti
        <br>
        • Kusaidia coding
        <br>
        • Kutoa maelezo mazuri

      </div>

    </div>

  `;

}



// SEND MESSAGE
async function sendMessage(){

  const input =
    document.getElementById(
      'messageInput'
    );

  const text =
    input.value.trim();

  if(!text) return;

  const chatBox =
    document.getElementById(
      'chatBox'
    );



  // USER MESSAGE
  const user =
    document.createElement('div');

  user.className =
    'flex justify-end';

  user.innerHTML = `

    <div
      class="bg-emerald-500 text-black rounded-3xl p-5 max-w-[70%] shadow-2xl">

      ${text}

    </div>

  `;

  chatBox.appendChild(user);

  input.value = '';



  // AI THINKING
  const loading =
    document.createElement('div');

  loading.className =
    'flex';

  loading.innerHTML = `

    <div
      class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%] animate-pulse">

      🤖 ChopaTech AI inaandika...

    </div>

  `;

  chatBox.appendChild(loading);

  chatBox.scrollTop =
    chatBox.scrollHeight;



  try{

    // CONNECT TO WORKERS AI
    const response =
      await fetch(
        "https://chopatech-ai.chopatechtz.workers.dev/",
        {

          method: "POST",

          headers: {
            "Content-Type":
              "application/json"
          },

          body: JSON.stringify({
            message: text
          })

        }
      );



    // SERVER ERROR
    if(!response.ok){

      throw new Error(
        "Server Error"
      );

    }



    const data =
      await response.json();

    loading.remove();



    // AI RESPONSE
    const aiResponse =

      data.response ||

      data.result?.response ||

      "Samahani, hakuna response.";





    // CREATE AI MESSAGE
    const ai =
      document.createElement('div');

    ai.className =
      'flex';

    ai.innerHTML = `

      <div
        class="bg-white/10 border border-white/10 rounded-3xl p-5 max-w-[70%] backdrop-blur-xl">

        <div id="typing"></div>

      </div>

    `;

    chatBox.appendChild(ai);

    chatBox.scrollTop =
      chatBox.scrollHeight;



    // TYPING EFFECT
    typeWriterEffect(
      ai.querySelector('#typing'),
      aiResponse
    );



    // AI SPEAK
    speakAI(aiResponse);




    // IMAGE REFERENCE
    if(

      text.includes("image")
      ||
      text.includes("picture")
      ||
      text.includes("photo")
      ||
      text.includes("onyesha")
      ||
      text.includes("picha")

    ){

      const image =
        document.createElement('img');

      image.src =
        "https://source.unsplash.com/800x500/?technology";

      image.className =
        "rounded-3xl mt-4 border border-white/10";

      ai.appendChild(image);

    }



  }

  catch(error){

    loading.remove();



    const err =
      document.createElement('div');

    err.className =
      'flex';

    err.innerHTML = `

      <div
        class="bg-red-500/20 border border-red-500 rounded-3xl p-5 max-w-[70%]">

        ❌ AI haijaunganishwa vizuri.

        <br><br>

        Hakikisha:
        <br>
        • Worker URL ni sahihi
        <br>
        • Worker imedeploy
        <br>
        • Workers AI binding ipo

      </div>

    `;

    chatBox.appendChild(err);

    console.error(error);

  }

}



// GPT TYPING EFFECT
function typeWriterEffect(
  element,
  text
){

  let i = 0;

  const speed = 15;

  function typing(){

    if(i < text.length){

      element.innerHTML +=
        text.charAt(i);

      i++;

      setTimeout(
        typing,
        speed
      );

    }

  }

  typing();

}



// VOICE INPUT
function startVoice(){

  if(
    !(
      'webkitSpeechRecognition'
      in window
    )
  ){

    alert(
      "Browser yako haisupport voice recognition."
    );

    return;

  }



  const recognition =
    new webkitSpeechRecognition();



  // SMART LANGUAGE
  recognition.lang =
    'en-US';

  recognition.continuous =
    false;

  recognition.interimResults =
    false;



  recognition.start();




  recognition.onstart =
    function(){

      console.log(
        "Voice listening..."
      );

    };



  recognition.onresult =
    function(event){

      const transcript =
        event.results[0][0]
        .transcript;

      document.getElementById(
        'messageInput'
      ).value = transcript;

      sendMessage();

    };



  recognition.onerror =
    function(){

      alert(
        "Voice recognition error."
      );

    };

}



// AI SPEAK
function speakAI(text){

  const speech =
    new SpeechSynthesisUtterance(
      text
    );



  // AUTO LANGUAGE
  if(

    /[a-z]/i.test(text)

  ){

    speech.lang =
      'en-US';

  }

  else{

    speech.lang =
      'sw-TZ';

  }



  speech.rate = 1;

  speech.pitch = 1;



  window.speechSynthesis
    .speak(speech);

}



// FILE UPLOAD
function uploadFile(event){

  const file =
    event.target.files[0];

  if(!file) return;



  document.getElementById(
    'uploadPreview'
  ).classList.remove('hidden');



  document.getElementById(
    'fileName'
  ).innerText =
    file.name;



  const chatBox =
    document.getElementById(
      'chatBox'
    );



  const upload =
    document.createElement('div');

  upload.className =
    'flex justify-end';



  upload.innerHTML = `

    <div
      class="bg-blue-500 rounded-3xl p-5 max-w-[70%]">

      📎 Uploaded:
      ${file.name}

    </div>

  `;

  chatBox.appendChild(upload);

  chatBox.scrollTop =
    chatBox.scrollHeight;

}



// REMOVE FILE
function removeUpload(){

  document.getElementById(
    'uploadPreview'
  ).classList.add('hidden');

}



// ENTER KEY SEND
document
  .getElementById(
    'messageInput'
  )

  .addEventListener(
    'keydown',

    function(event){

      if(
        event.key === 'Enter'
        &&
        !event.shiftKey
      ){

        event.preventDefault();

        sendMessage();

      }

    }

);



// AUTO START
newChat();

</script>

</body>
</html>
