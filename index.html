<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChopaTech AI UI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND GLOW -->
<div class="bg-glow"></div>

<!-- NAV -->
<nav>
  <h1>CHOPATECH</h1>
  <button onclick="toggleChat()" class="chat-btn">AI Chat</button>
</nav>

<!-- HERO -->
<section class="hero">
  <h2>Intelligent Digital Experience</h2>
  <p>Next-gen AI-powered website with embedded chatbot UI</p>
</section>

<!-- CHATBOT UI -->
<div class="chat-container" id="chatContainer">

  <div class="chat-header">
    <h3>Chopa AI Assistant</h3>
    <span onclick="toggleChat()">✖</span>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="bot-msg">Hello 👋 I'm your AI assistant. Ask me anything.</div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
