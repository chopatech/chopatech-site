<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutureTech Hub</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function FutureTechProjectsPage() {

  const [menuOpen, setMenuOpen] = useState(false);

  return (
    <div className="min-h-screen bg-black text-white overflow-hidden font-sans relative">

      {/* BACKGROUND EFFECTS */}
      <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,#1e3a8a22,transparent_40%),radial-gradient(circle_at_bottom_left,#06b6d422,transparent_40%)]"></div>

      <div className="absolute top-20 left-20 w-72 h-72 bg-cyan-500/20 blur-3xl rounded-full animate-pulse"></div>
      <div className="absolute bottom-20 right-20 w-80 h-80 bg-blue-500/20 blur-3xl rounded-full animate-pulse"></div>

      {/* NAVBAR */}
      <header className="relative z-50 border-b border-white/10 backdrop-blur-xl bg-white/5 sticky top-0">

        <div className="max-w-7xl mx-auto flex items-center justify-between px-4 md:px-6 py-4">

          {/* LEFT SIDE */}
          <div className="flex items-center gap-4">

            {/* HAMBURGER */}
            <button
              onClick={() => setMenuOpen(!menuOpen)}
              className="flex flex-col gap-[5px] md:hidden"
            >
              <span className="w-7 h-[3px] bg-white rounded-full"></span>
              <span className="w-7 h-[3px] bg-white rounded-full"></span>
              <span className="w-7 h-[3px] bg-white rounded-full"></span>
            </button>

            {/* LOGO */}
            <h1 className="text-2xl md:text-3xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 text-transparent bg-clip-text">
              FutureTech Hub
            </h1>

          </div>

          {/* RIGHT SIDE */}
          <div className="flex items-center gap-6">

            {/* DESKTOP MENU */}
            <nav className="hidden md:flex gap-8 text-sm text-gray-300">
              <a href="#">Home</a>
              <a href="#projects">Projects</a>
              <a href="#innovation">Innovation</a>
              <a href="#contact">Contact</a>
            </nav>

            {/* EXPLORE BUTTON (ONLY HERE) */}
            <button className="bg-gradient-to-r from-cyan-500 to-blue-600 px-5 py-2 rounded-full hover:scale-105 transition shadow-lg shadow-cyan-500/30">
              Explore
            </button>

          </div>

        </div>

        {/* MOBILE MENU (NO EXPLORE HERE) */}
        {menuOpen && (
          <div className="md:hidden px-6 pb-6 flex flex-col gap-5 text-gray-300 bg-black/80 backdrop-blur-xl">

            <a href="#">Home</a>
            <a href="#projects">Projects</a>
            <a href="#innovation">Innovation</a>
            <a href="#contact">Contact</a>

          </div>
        )}

      </header>

      {/* HERO */}
      <section className="relative z-10 text-center px-4 md:px-6 pt-20 pb-16">

        <div className="inline-block px-4 py-2 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-300 text-sm mb-6">
          Modern Design • Creativity • Engineering
        </div>

        <h2 className="text-4xl md:text-7xl font-black">
          Building The{" "}
          <span className="bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 text-transparent bg-clip-text">
            Future of Technology
          </span>
        </h2>

        <p className="max-w-3xl mx-auto mt-6 text-gray-300">
          Modern innovation, AI systems, engineering creativity and futuristic web experience.
        </p>

      </section>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <FutureTechProjectsPage />
);

</script>

</body>
</html>
